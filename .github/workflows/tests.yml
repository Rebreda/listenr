name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system audio libs
        # sounddevice needs PortAudio headers; soundfile needs libsndfile
        run: sudo apt-get install -y --no-install-recommends libportaudio2 libsndfile1

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v
