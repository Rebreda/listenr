<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Listenr - Live Transcription (Lemonade)</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }
        .center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .transcript {
            font-size: 2rem;
            margin: 40px 0;
            min-height: 2em;
            text-align: center;
        }
        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: #222;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            margin-bottom: 30px;
        }
        .history {
            width: 350px;
            max-width: 90vw;
            margin: 0 auto;
            background: #111;
            border-radius: 8px;
            padding: 10px 20px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 1rem;
        }
        .history-item {
            margin-bottom: 8px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
<div class="center">
    <button id="micBtn" class="mic-btn">🎤</button>
    <div id="transcript" class="transcript">Click mic to start</div>
    <div class="history" id="history"></div>
</div>
<script>

let ws = null;
let audioContext = null;
let mediaStream = null;
let isActive = false;
let transcriptDiv = document.getElementById('transcript');
let micBtn = document.getElementById('micBtn');
let historyDiv = document.getElementById('history');
let audioSource = null;
let processor = null;
let WS_URL = null;
let WS_MODEL = null;

// Fetch config from backend
async function fetchConfig() {
    let resp = await fetch('/api/config');
    let data = await resp.json();
    WS_URL = data.ws_url;
    WS_MODEL = data.model;
}

micBtn.onclick = async function() {
    if (!isActive) {
        await start();
    } else {
        stop();
    }
};

async function start() {
    try {
        if (!WS_URL || !WS_MODEL) await fetchConfig();
        let wsUrl = WS_URL.includes('?') ? `${WS_URL}&model=${encodeURIComponent(WS_MODEL)}` : `${WS_URL}?model=${encodeURIComponent(WS_MODEL)}`;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            transcriptDiv.textContent = "Listening...";
            micBtn.textContent = "⏹️";
        };
        ws.onclose = stop;
        ws.onerror = stop;
        ws.onmessage = (event) => {
            let msg = JSON.parse(event.data);
            if (msg.type === "conversation.item.input_audio_transcription.completed") {
                let text = msg.transcript;
                transcriptDiv.textContent = text;
                let div = document.createElement("div");
                div.className = "history-item";
                div.textContent = text;
                historyDiv.insertBefore(div, historyDiv.firstChild);
                while (historyDiv.children.length > 20) historyDiv.removeChild(historyDiv.lastChild);
            }
        };

        // Get mic
        mediaStream = await navigator.mediaDevices.getUserMedia({audio: {channelCount: 1}});
        audioContext = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 16000});
        audioSource = audioContext.createMediaStreamSource(mediaStream);

        // ScriptProcessorNode for 16kHz mono PCM16
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        audioSource.connect(processor);
        processor.connect(audioContext.destination);

        processor.onaudioprocess = (e) => {
            if (!ws || ws.readyState !== 1) return;
            let input = e.inputBuffer.getChannelData(0);
            // Convert Float32 [-1,1] to Int16 PCM
            let pcm16 = new Int16Array(input.length);
            for (let i = 0; i < input.length; ++i) {
                let s = Math.max(-1, Math.min(1, input[i]));
                pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            let b64 = btoa(String.fromCharCode.apply(null, new Uint8Array(pcm16.buffer)));
            ws.send(JSON.stringify({
                type: "input_audio_buffer.append",
                audio: b64
            }));
        };

        isActive = true;
    } catch (e) {
        transcriptDiv.textContent = "Mic error: " + e.message;
        stop();
    }
}

function stop() {
    if (ws) { ws.close(); ws = null; }
    if (processor) { processor.disconnect(); processor = null; }
    if (audioSource) { audioSource.disconnect(); audioSource = null; }
    if (audioContext) { audioContext.close(); audioContext = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    isActive = false;
    micBtn.textContent = "🎤";
    transcriptDiv.textContent = "Click mic to start";
}
</script>
</body>
</html>
