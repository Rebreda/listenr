# docker-compose.yml — Listenr AMD ROCm fine-tuning
#
# Quick start:
#   scripts/setup-env.sh                        # write .env from $HOME defaults
#   podman compose build
#   podman compose run --rm build-dataset       # build HF dataset from manifest
#   podman compose run --rm finetune            # fine-tune (defaults: bf16, 2000 steps)
#   podman compose run --rm merge               # merge adapter → standalone model
#
# Edit .env to override any path or GPU setting.
# GPU passthrough requires the ROCm driver on the host.

x-rocm-base: &rocm-base
  build: .
  image: listenr-rocm
  cap_add:
    - SYS_PTRACE
  security_opt:
    - seccomp=unconfined

services:

  # ── fine-tune Whisper with LoRA ────────────────────────────────────────────
  finetune:
    <<: *rocm-base
    # Run as the host UID so adapter checkpoints written to the bind mount are
    # owned by you, not a subuid (which looks root-ish on the host).
    userns_mode: "keep-id"
    ipc: host
    # AMD's recommended pattern: pass the whole /dev/dri directory and let
    # HIP_VISIBLE_DEVICES select. Auto-handles any single- or multi-GPU
    # system without hardcoding card*/renderD* node numbers.
    devices:
      - /dev/kfd
      - /dev/dri
    # keep-groups passes the host user's actual supplementary GIDs (render, video)
    # into the container, bypassing the GID name→number mismatch between the
    # Ubuntu-based image (render=991, video=44) and the host (render=105, video=39).
    group_add:
      - keep-groups
    environment:
      # Pin to one GPU to avoid imbalance warnings/segfaults on multi-GPU systems.
      # Set to "0,1" to use both GPUs if they are matched.
      HIP_VISIBLE_DEVICES: "${HIP_VISIBLE_DEVICES:-0}"
      # Enables Flash Efficient / Memory Efficient attention on RDNA3+.
      # Set to "" to disable (falls back to slower implementation with a warning).
      TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL: "${TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL:-1}"
      # Relocate MIOpen's lockfile DB and JIT kernel cache out of $HOME so the
      # container UID can write to them (matters with `userns_mode: keep-id`).
      MIOPEN_USER_DB_PATH: "/tmp/miopen"
      MIOPEN_CUSTOM_CACHE_DIR: "/tmp/miopen"
      # With userns_mode: keep-id, $HOME still points to /root inside the container,
      # but the process runs as the host UID which doesn't own /root. listenr resolves
      # config/cache paths via os.path.expanduser('~'), so it would fail to find the
      # bind-mounted config at /home/ubuntu. Set HOME explicitly so expanduser('~')
      # resolves to the ubuntu user's home where the bind mounts are.
      HOME: "/home/ubuntu"
      # HSA_OVERRIDE_GFX_VERSION: set in .env only if your GPU needs it.
      # An empty string is NOT the same as unset — it causes ROCm to fail.
      #   RX 6000 / RDNA2 → 10.3.0       RX 7000 / RDNA3 → 11.0.0
    volumes:
      # HF dataset produced by build-dataset
      - "${LISTENR_DATASET}:/data/dataset:z"
      # Audio source: dataset Arrow files store absolute host paths to .wav
      # clips, so mount LISTENR_DATA at the SAME path inside the container.
      # (Avoid by rebuilding the dataset with `build-dataset --remap-audio-prefix`.)
      - "${LISTENR_DATA}:${LISTENR_DATA}:z,ro"
      # Adapter checkpoint output
      - "${LISTENR_FINETUNE}:/data/adapter:z"
      # Listenr config (read by listenr-finetune)
      - "${LISTENR_CONFIG}:/home/ubuntu/.config/listenr:z"
      # HuggingFace model cache — avoids re-downloading on every run.
      # Mounted under /home/ubuntu (not /root) because userns_mode=keep-id
      # makes the container process run as the host UID == image's ubuntu user.
      - "${HF_CACHE}:/home/ubuntu/.cache/huggingface:z"
    working_dir: /app
    # NOTE: defaults live in `entrypoint`, not `command`, because
    # `podman compose run SERVICE EXTRA_ARGS` REPLACES `command` but leaves
    # `entrypoint` intact. With defaults in entrypoint, users can append
    # extra flags (e.g. `run --rm finetune --max-steps 500`) without losing
    # the dataset/output/bf16 settings.
    entrypoint:
      - "listenr-finetune"
      - "--dataset=/data/dataset/hf_dataset"
      - "--output=/data/adapter"
      - "--bf16"
    command: []

  # ── build train/dev/test splits from manifest.jsonl ───────────────────────
  build-dataset:
    <<: *rocm-base
    volumes:
      # Audio clips + manifest.jsonl
      - "${LISTENR_DATA}:/data/listenr:z"
      # Dataset output
      - "${LISTENR_DATASET}:/data/dataset:z"
    working_dir: /app
    # Defaults in entrypoint so `run SERVICE EXTRA_ARGS` can append flags
    # without wiping out the manifest/output paths. See note on finetune service.
    entrypoint:
      - "listenr-build-dataset"
      - "--manifest=/data/listenr/audio_clips/manifest.jsonl"
      - "--output=/data/dataset"
      - "--format=hf"
      # Rewrites host absolute paths in manifest.jsonl to container paths.
      # OLD is the host prefix stored in manifest entries; NEW is where it's mounted here.
      - "--remap-audio-prefix=${LISTENR_DATA}/audio_clips:/data/listenr/audio_clips"
    command: []

  # ── merge LoRA adapter into base model → standalone merged model ──────────
  merge:
    <<: *rocm-base
    # Merge is pure CPU matrix math — no GPU needed, and loading ROCm
    # device drivers causes a segfault during PeftModel.merge_and_unload().
    environment:
      # Force CPU-only execution — keeps ROCm HSA runtime fully uninitialised
      HIP_VISIBLE_DEVICES: "-1"
      CUDA_VISIBLE_DEVICES: "-1"
    volumes:
      # LoRA adapter produced by finetune (input)
      - "${LISTENR_FINETUNE}:/data/adapter:z"
      # Destination for the merged model (output)
      - "${LISTENR_MERGED}:/data/merged:z"
      # HuggingFace model cache — avoids re-downloading base model
      - "${HF_CACHE}:/root/.cache/huggingface:z"
    working_dir: /app
    # Defaults in entrypoint so `run SERVICE EXTRA_ARGS` can append flags.
    entrypoint:
      - "listenr-merge"
      - "--adapter=/data/adapter"
      - "--output=/data/merged"
    command: []
